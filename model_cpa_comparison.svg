<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520">
  <defs>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #111827; }
      .label { font: 14px Arial, sans-serif; fill: #374151; }
      .axis { stroke: #6b7280; stroke-width: 2; }
      .grid { stroke: #e5e7eb; stroke-width: 1; }
      .tick { font: 12px Arial, sans-serif; fill: #4b5563; }
      .legend { font: 13px Arial, sans-serif; fill: #1f2937; }
    </style>
  </defs>

  <rect x="0" y="0" width="920" height="520" fill="#ffffff"/>
  <text x="460" y="40" text-anchor="middle" class="title">CPA Comparison: Model 1 vs Model 2</text>

  <!-- Plot area -->
  <rect x="90" y="80" width="760" height="340" fill="#ffffff"/>

  <!-- Horizontal grid lines and y ticks -->
  <line x1="90" y1="420" x2="850" y2="420" class="grid"/>
  <line x1="90" y1="352" x2="850" y2="352" class="grid"/>
  <line x1="90" y1="284" x2="850" y2="284" class="grid"/>
  <line x1="90" y1="216" x2="850" y2="216" class="grid"/>
  <line x1="90" y1="148" x2="850" y2="148" class="grid"/>
  <line x1="90" y1="80" x2="850" y2="80" class="grid"/>

  <text x="76" y="424" text-anchor="end" class="tick">0</text>
  <text x="76" y="356" text-anchor="end" class="tick">20</text>
  <text x="76" y="288" text-anchor="end" class="tick">40</text>
  <text x="76" y="220" text-anchor="end" class="tick">60</text>
  <text x="76" y="152" text-anchor="end" class="tick">80</text>
  <text x="76" y="84" text-anchor="end" class="tick">100</text>

  <!-- Axes -->
  <line x1="90" y1="80" x2="90" y2="420" class="axis"/>
  <line x1="90" y1="420" x2="850" y2="420" class="axis"/>

  <!-- Category labels -->
  <text x="220" y="450" text-anchor="middle" class="label">Best</text>
  <text x="470" y="450" text-anchor="middle" class="label">Base</text>
  <text x="720" y="450" text-anchor="middle" class="label">Conservative</text>

  <!-- Bars (Model 1: TikTok GMV Max: 15, 19, 26) -->
  <rect x="170" y="369" width="40" height="51" fill="#93c5fd"/>
  <rect x="420" y="355" width="40" height="65" fill="#93c5fd"/>
  <rect x="670" y="332" width="40" height="88" fill="#93c5fd"/>

  <!-- Bars (Model 2: Meta + Creator Payments: 65, 78, 95) -->
  <rect x="230" y="199" width="40" height="221" fill="#fca5a5"/>
  <rect x="480" y="155" width="40" height="265" fill="#fca5a5"/>
  <rect x="730" y="97" width="40" height="323" fill="#fca5a5"/>

  <!-- Line (Model 1) -->
  <polyline points="190,369 440,355 690,332" fill="none" stroke="#2563eb" stroke-width="3"/>
  <circle cx="190" cy="369" r="5" fill="#2563eb"/>
  <circle cx="440" cy="355" r="5" fill="#2563eb"/>
  <circle cx="690" cy="332" r="5" fill="#2563eb"/>

  <!-- Line (Model 2) -->
  <polyline points="250,199 500,155 750,97" fill="none" stroke="#dc2626" stroke-width="3"/>
  <circle cx="250" cy="199" r="5" fill="#dc2626"/>
  <circle cx="500" cy="155" r="5" fill="#dc2626"/>
  <circle cx="750" cy="97" r="5" fill="#dc2626"/>

  <!-- Data labels -->
  <text x="190" y="359" text-anchor="middle" class="tick">15</text>
  <text x="440" y="345" text-anchor="middle" class="tick">19</text>
  <text x="690" y="322" text-anchor="middle" class="tick">26</text>
  <text x="250" y="189" text-anchor="middle" class="tick">65</text>
  <text x="500" y="145" text-anchor="middle" class="tick">78</text>
  <text x="750" y="87" text-anchor="middle" class="tick">95</text>

  <!-- Axis title -->
  <text x="28" y="255" transform="rotate(-90 28 255)" class="label">CPA ($)</text>

  <!-- Legend -->
  <rect x="130" y="470" width="14" height="14" fill="#93c5fd"/>
  <line x1="130" y1="477" x2="144" y2="477" stroke="#2563eb" stroke-width="2"/>
  <text x="152" y="482" class="legend">Model 1: TikTok GMV Max</text>

  <rect x="420" y="470" width="14" height="14" fill="#fca5a5"/>
  <line x1="420" y1="477" x2="434" y2="477" stroke="#dc2626" stroke-width="2"/>
  <text x="442" y="482" class="legend">Model 2: Meta + Creator Payments</text>
</svg>
